robot_config: configs/robots/g1_29dof.yaml

datasets:
  - name: g1_robot_state_sample
    format: robot_state_csv
    source_path: humanoidverse/data/examples/g1_robot_state_sample.csv
    weight: 1.0
    fps: 50
    columns:
      root_pos: [root_pos_x, root_pos_y, root_pos_z]
      root_quat: [root_quat_x, root_quat_y, root_quat_z, root_quat_w]
      dof_pos: xml_order
    auto_build:
      train_clip_seconds: 10.0
      clip_stride_seconds: 10.0
      keep_short: true
      min_clip_seconds: 1.0
